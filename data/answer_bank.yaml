why_public_markets:
  angle: "I enjoy analysing how fundamentals, expectations and market pricing interact. Credit has trained me to think carefully about downside risk, cash-flow durability and balance-sheet resilience."

why_hedge_fund:
  angle: "I am attracted to environments where research quality, judgement, speed of learning and clear investment views matter."

credit_to_equity:
  angle: "My credit background gives me a differentiated lens on equities: I am trained to understand downside risk, refinancing risk, capital allocation and the market-implied expectations embedded in securities pricing."

systematic_transition:
  angle: "I am interested in combining fundamental investment judgement with more systematic use of data, transcripts, pricing signals and econometric methods."

python_gap_honest_framing:
  angle: "I am not trying to present myself as a production software engineer; I am building Python capability deliberately to strengthen my investment research workflow."
